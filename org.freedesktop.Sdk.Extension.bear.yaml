id: 'org.freedesktop.Sdk.Extension.bear'
branch: '25.08'
runtime: 'org.freedesktop.Sdk'
runtime-version: '25.08'
build-extension: true
sdk: 'org.freedesktop.Sdk'
sdk-extensions: ['org.freedesktop.Sdk.Extension.rust-stable']
separate-locales: false
cleanup:
  - '/share/info'
  - '/share/man'

modules:
  - name: 'bear'
    buildsystem: simple
    build-options:
      append-path: '/usr/lib/sdk/rust-stable/bin'
      env:
        CARGO_HOME: '/run/build/bear/cargo'
        CARGO_NET_OFFLINE: 'true'
    sources:
      - type: git
        url: 'https://github.com/rizsotto/Bear.git'
        tag: '4.1.3'
      - 'cargo-deps.json'
    build-commands:
      - 'cargo --offline fetch --manifest-path Cargo.toml --verbose'
      - 'cargo build --offline --release'
      - 'PREFIX="${FLATPAK_DEST}" ./scripts/install.sh'

  - name: 'scripts'
    buildsystem: simple
    sources:
      - type: script
        commands:
          - 'export PATH=$PATH:/usr/lib/sdk/bear/bin'
        dest-filename: 'enable.sh'
    build-commands:
      - 'cp *.sh ${FLATPAK_DEST}'

  - name: 'appdata'
    buildsystem: simple
    sources:
      - type: file
        path: 'org.freedesktop.Sdk.Extension.bear.appdata.xml'
    build-commands:
      - 'mkdir -p ${FLATPAK_DEST}/share/metainfo'
      - 'cp org.freedesktop.Sdk.Extension.bear.appdata.xml ${FLATPAK_DEST}/share/metainfo'
